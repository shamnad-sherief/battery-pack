# All crates get published to crates.io when their version changes,
# but only `battery-pack` gets a GitHub release (tag + release notes).
[workspace]
git_release_enable = false

[[package]]
name = "battery-pack"
git_release_enable = true
# Roll commits from these crates into the battery-pack changelog,
# so the GitHub release notes cover the whole workspace.
changelog_include = [
    "bphelper-build",
    "bphelper-cli",
    "bphelper-manifest",
]

# TODO: re-enable once trusted publishing is set up
[[package]]
name = "cli-battery-pack"
release = false

[[package]]
name = "error-battery-pack"
release = false

[[package]]
name = "logging-battery-pack"
release = false
